<script>
  (function () {
    var canvas = document.getElementById('starry-particles');
    if (!canvas) return;

    /* Save the theme's original body background, then make body transparent
       so the canvas becomes the visible background */
    var body = document.body;
    var root = document.documentElement;

    function getThemeBg() {
      var bg = getComputedStyle(root).getPropertyValue('--body-bg-color').trim();
      if (!bg || bg === 'rgba(0, 0, 0, 0)' || bg === 'transparent') {
        bg = getComputedStyle(body).backgroundColor;
      }
      if (!bg || bg === 'rgba(0, 0, 0, 0)' || bg === 'transparent') {
        bg = '#050508';
      }
      return bg;
    }

    var themeBg = getThemeBg();
    body.style.backgroundColor = 'transparent';
    root.style.backgroundColor = 'transparent';

    var ctx = canvas.getContext('2d');

    /* Re-read the theme background when dark/light mode changes */
    function updateThemeBg() {
      themeBg = getThemeBg();
      updateParticleColors();
    }

    function updateParticleColors() {
      var dark = isDarkMode();
      particles.forEach(function (p) {
        p.color = dark ? '255, 255, 255' : '100, 149, 237';
      });
    }

    var colorSchemeObserver = new MutationObserver(function (mutations) {
      updateThemeBg();
    });
    colorSchemeObserver.observe(document.documentElement, {
      attributes: true,
      attributeFilter: ['data-user-color-scheme']
    });

    /* Also listen for changes in prefers-color-scheme (system theme) */
    if (window.matchMedia) {
      var mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
      if (mediaQuery.addEventListener) {
        mediaQuery.addEventListener('change', updateThemeBg);
      } else if (mediaQuery.addListener) {
        mediaQuery.addListener(updateThemeBg);
      }
    }
    var particles = [];
    var isMobile = window.innerWidth < 768;
    var mouse = { x: null, y: null };
    var rafId = null;
    var mouseRafId = null;
    var lastMouseTime = 0;

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    /* Density based on screen width */
    function getDensity() {
      if (window.innerWidth < 768) return 40;
      if (window.innerWidth < 1200) return 80;
      if (window.innerWidth > 1920) return 160;
      return 60;
    }

    /* Detect if the current theme is dark */
    function isDarkMode() {
      var root = document.documentElement;
      var userScheme = root.getAttribute('data-user-color-scheme');
      if (userScheme === 'dark') return true;
      if (userScheme === 'light') return false;
      var defaultScheme = root.getAttribute('data-default-color-scheme');
      if (defaultScheme === 'dark') return true;
      if (defaultScheme === 'light') return false;
      var bg = getComputedStyle(document.body).backgroundColor;
      if (!bg || bg === 'rgba(0, 0, 0, 0)' || bg === 'transparent') return true;
      var rgb = bg.match(/\d+/g);
      if (rgb && rgb.length >= 3) {
        var brightness = (parseInt(rgb[0]) * 299 + parseInt(rgb[1]) * 587 + parseInt(rgb[2]) * 114) / 1000;
        return brightness < 128;
      }
      return true;
    }

    /* Star-like particle */
    var Particle = function () {
      this.reset();
    };

    Particle.prototype.reset = function () {
      this.x = Math.random() * canvas.width;
      this.y = Math.random() * canvas.height;
      this.vx = (Math.random() - 0.5) * 0.3;
      this.vy = (Math.random() - 0.5) * 0.3;
      this.size = Math.random() * 1.8 + 0.6;
      this.baseAlpha = Math.random() * 0.5 + 0.3;
      this.twinkleSpeed = Math.random() * 0.02 + 0.005;
      this.twinkleOffset = Math.random() * Math.PI * 2;
      this.color = isDarkMode() ? '255, 255, 255' : '100, 149, 237';
    };

    Particle.prototype.update = function (time) {
      this.x += this.vx;
      this.y += this.vy;

      /* Wrap around edges */
      if (this.x < 0) this.x = canvas.width;
      if (this.x > canvas.width) this.x = 0;
      if (this.y < 0) this.y = canvas.height;
      if (this.y > canvas.height) this.y = 0;

      /* Twinkle effect */
      this.alpha = this.baseAlpha + Math.sin(time * this.twinkleSpeed + this.twinkleOffset) * 0.15;

      /* Mouse repulsion */
      if (mouse.x !== null && mouse.y !== null) {
        var dx = this.x - mouse.x;
        var dy = this.y - mouse.y;
        var dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 120) {
          var force = (120 - dist) / 120;
          this.x += (dx / dist) * force * 3;
          this.y += (dy / dist) * force * 3;
        }
      }
    };

    Particle.prototype.draw = function () {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(' + this.color + ', ' + this.alpha + ')';
      ctx.fill();

      /* Soft glow for larger stars */
      if (this.size > 1.6) {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size * 3, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(" + this.color + ", 0.08)";
        ctx.fill();
      }
    };

    function initParticles() {
      particles = [];
      var density = getDensity();
      for (var i = 0; i < density; i++) {
        particles.push(new Particle());
      }
    }

    /* Draw lines between nearby particles (PC only) */
    function drawConnections() {
      if (isMobile) return;
      var maxDist = 140;
      for (var i = 0; i < particles.length; i++) {
        for (var j = i + 1; j < particles.length; j++) {
          var dx = particles[i].x - particles[j].x;
          var dy = particles[i].y - particles[j].y;
          var dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < maxDist) {
            var alpha = 0.12 * (1 - dist / maxDist);
            ctx.beginPath();
            ctx.strokeStyle = "rgba(" + particles[i].color + ", " + alpha + ")";
            ctx.lineWidth = 0.5;
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.stroke();
          }
        }
      }
    }

    /* Shooting star / meteor effect */
    var meteors = [];
    var Meteor = function () {
      this.reset();
    };
    Meteor.prototype.reset = function () {
      this.active = false;
    };
    Meteor.prototype.spawn = function () {
      this.x = Math.random() * canvas.width * 1.2;
      this.y = Math.random() * canvas.height * 0.4;
      this.length = Math.random() * 120 + 60;
      this.speed = Math.random() * 8 + 6;
      this.angle = Math.PI / 4;
      this.life = 1;
      this.decay = Math.random() * 0.015 + 0.008;
      this.active = true;
      this.width = Math.random() * 2 + 1;
    };
    Meteor.prototype.update = function () {
      if (!this.active) return;
      this.x += Math.cos(this.angle) * this.speed;
      this.y += Math.sin(this.angle) * this.speed;
      this.life -= this.decay;
      if (this.life <= 0 || this.x > canvas.width + this.length || this.y > canvas.height + this.length) {
        this.active = false;
      }
    };
    Meteor.prototype.draw = function () {
      if (!this.active) return;
      var tailX = this.x - Math.cos(this.angle) * this.length;
      var tailY = this.y - Math.sin(this.angle) * this.length;
      var grad = ctx.createLinearGradient(tailX, tailY, this.x, this.y);
      var colorBase = isDarkMode() ? '255, 255, 255' : '100, 149, 237';
      grad.addColorStop(0, 'rgba(' + colorBase + ', 0)');
      grad.addColorStop(0.7, 'rgba(' + colorBase + ', ' + (this.life * 0.3) + ')');
      grad.addColorStop(1, 'rgba(' + colorBase + ', ' + this.life + ')');
      ctx.beginPath();
      ctx.moveTo(tailX, tailY);
      ctx.lineTo(this.x, this.y);
      ctx.strokeStyle = grad;
      ctx.lineWidth = this.width;
      ctx.lineCap = 'round';
      ctx.stroke();
    };

    function trySpawnMeteor() {
      if (isMobile) return;
      /* Spawn a meteor roughly every 3-6 seconds */
      if (Math.random() < 0.008) {
        for (var i = 0; i < meteors.length; i++) {
          if (!meteors[i].active) {
            meteors[i].spawn();
            return;
          }
        }
        if (meteors.length < 3) {
          var m = new Meteor();
          m.spawn();
          meteors.push(m);
        }
      }
    }

    function drawVignette() {
      var cx = canvas.width / 2;
      var cy = canvas.height / 2;
      var grad = ctx.createRadialGradient(cx, cy, Math.min(canvas.width, canvas.height) * 0.35, cx, cy, Math.max(canvas.width, canvas.height) * 0.8);
      var darkness = isDarkMode() ? 0.45 : 0.18;
      grad.addColorStop(0, 'rgba(0, 0, 0, 0)');
      grad.addColorStop(1, 'rgba(0, 0, 0, ' + darkness + ')');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function animate(time) {
      /* Fill with the theme's original background to avoid white gaps */
      ctx.fillStyle = themeBg;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      particles.forEach(function (p) {
        p.update(time || 0);
        p.draw();
      });

      drawConnections();

      /* Update and draw meteors */
      trySpawnMeteor();
      meteors.forEach(function (m) {
        m.update();
        m.draw();
      });

      /* Subtle vignette overlay */
      drawVignette();
      rafId = requestAnimationFrame(animate);
    }

    function onResize() {
      var prev = isMobile;
      isMobile = window.innerWidth < 768;
      var oldWidth = canvas.width;
      var oldHeight = canvas.height;
      resize();
      if (prev !== isMobile || particles.length === 0 || canvas.width !== oldWidth || canvas.height !== oldHeight) {
        initParticles();
        /* Re-apply current scroll parallax after particles are reset */
        applyParallax(window.scrollY);
        lastScrollY = window.scrollY;
      }
    }

    /* Parallax scrolling: move stars slower than page content */
    var parallaxFactor = 0.15;
    var lastScrollY = window.scrollY;

    function applyParallax(amount) {
      if (!particles.length) return;
      var h = canvas.height;
      particles.forEach(function (p) {
        p.y -= amount * parallaxFactor;
        /* Wrap around vertically to keep particles in view */
        while (p.y < 0) p.y += h;
        while (p.y > h) p.y -= h;
      });
      /* Also shift meteors so they don't drift too far */
      meteors.forEach(function (m) {
        if (m.active) {
          m.y -= amount * parallaxFactor;
        }
      });
    }

    window.addEventListener('scroll', function () {
      var currentScrollY = window.scrollY;
      var delta = currentScrollY - lastScrollY;
      if (delta !== 0) {
        applyParallax(delta);
        lastScrollY = currentScrollY;
      }
    }, { passive: true });

    /* Apply initial parallax in case page is loaded scrolled down */
    applyParallax(window.scrollY);

    /* Throttle mouse move to ~30 FPS for performance */
    function onMouseMove(e) {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
      lastMouseTime = Date.now();
      if (mouseRafId) cancelAnimationFrame(mouseRafId);
      mouseRafId = requestAnimationFrame(function () {
        setTimeout(function () {
          if (Date.now() - lastMouseTime > 80) {
            mouse.x = null;
            mouse.y = null;
          }
        }, 100);
      });
    }

    window.addEventListener('resize', onResize);
    document.addEventListener('mousemove', onMouseMove, { passive: true });
    document.addEventListener('mouseleave', function () {
      mouse.x = null;
      mouse.y = null;
    });

    resize();
    initParticles();
    animate(0);
  })();
</script>

  Fluid.utils.createScript('https://lib.baomitu.com/anchor-js/5.0.0/anchor.min.js', function() {
    window.anchors.options = {
      placement: CONFIG.anchorjs.placement,
      visible  : CONFIG.anchorjs.visible
    };
    if (CONFIG.anchorjs.icon) {
      window.anchors.options.icon = CONFIG.anchorjs.icon;
    }
    var el = (CONFIG.anchorjs.element || 'h1,h2,h3,h4,h5,h6').split(',');
    var res = [];
    for (var item of el) {
      res.push('.markdown-body > ' + item.trim());
    }
    if (CONFIG.anchorjs.placement === 'left') {
      window.anchors.options.class = 'anchorjs-link-left';
    }
    window.anchors.add(res.join(', '));

    Fluid.events.registerRefreshCallback(function() {
      if ('anchors' in window) {
        anchors.removeAll();
        var el = (CONFIG.anchorjs.element || 'h1,h2,h3,h4,h5,h6').split(',');
        var res = [];
        for (var item of el) {
          res.push('.markdown-body > ' + item.trim());
        }
        if (CONFIG.anchorjs.placement === 'left') {
          anchors.options.class = 'anchorjs-link-left';
        }
        anchors.add(res.join(', '));
      }
    });
  });
</script>
